name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Restore dependencies
      run: dotnet restore
      working-directory: src/TinyCSharp.Compiler
      
    - name: Build
      run: dotnet build --no-restore
      working-directory: src/TinyCSharp.Compiler
      
    - name: Test
      run: dotnet test --no-build --verbosity normal
      working-directory: tests/TinyCSharp.Compiler.Tests
      
    - name: Run sample compilation
      run: |
        cd samples/TinyCSharp.Sample
        dotnet build
      