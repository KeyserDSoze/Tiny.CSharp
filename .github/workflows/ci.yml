name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Restore dependencies
      run: dotnet restore Tiny.CSharp.sln
      working-directory: ${{ github.workspace }}
      
    - name: Build
      run: dotnet build src/TinyCSharp.Compiler/TinyCSharp.Compiler.csproj --no-restore
      working-directory: ${{ github.workspace }}

    - name: Test unit
      run: dotnet test tests/TinyCSharp.Compiler.Tests/TinyCSharp.Compiler.Tests.csproj --no-build --verbosity normal
      working-directory: ${{ github.workspace }}

    - name: Test integration
      run: dotnet test tests/TinyCSharp.IntegrationTests/TinyCSharp.IntegrationTests.csproj --no-build --verbosity normal
      working-directory: ${{ github.workspace }}

    - name: Run sample compilation
      run: dotnet build samples/TinyCSharp.Sample/TinyCSharp.Sample.csproj --verbosity normal
      working-directory: ${{ github.workspace }}
      
